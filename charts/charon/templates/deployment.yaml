apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "charon.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "charon.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "charon.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "charon.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "charon.fullname" . }}
      containers:
        - name: charon
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 50051
          env:
            - name: SERVICE_NAME
              value: {{ .Values.env.SERVICE_NAME | quote }}
            - name: SERVICE_VERSION
              value: {{ .Values.env.SERVICE_VERSION | quote }}
            - name: CHARON_AGENT_ID
              value: {{ .Values.env.CHARON_AGENT_ID | quote }}
            - name: JUDY_GRPC_TARGET
              value: {{ .Values.env.JUDY_GRPC_TARGET | quote }}
            - name: JUDY_TIMEOUT_SECONDS
              value: {{ .Values.env.JUDY_TIMEOUT_SECONDS | quote }}
            - name: CHARON_SIGNATURE_HEADER
              value: {{ .Values.env.CHARON_SIGNATURE_HEADER | quote }}
            - name: JUDY_GRPC_TLS_ENABLED
              value: {{ .Values.tls.enabled | quote }}
            - name: JUDY_GRPC_CA_PATH
              value: {{ printf "%s/%s" .Values.tls.mountPath .Values.tls.caSecretKey | quote }}
            - name: GRPC_PORT
              value: {{ .Values.service.port | quote }}
            - name: CHARON_SIGNATURE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "charon.fullname" . }}-secrets
                  key: CHARON_SIGNATURE_SECRET
          {{- if .Values.tls.enabled }}
          volumeMounts:
            - name: judy-ca
              mountPath: {{ .Values.tls.mountPath | quote }}
              readOnly: true
          {{- end }}
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 12 }}
      {{- if .Values.tls.enabled }}
      volumes:
        - name: judy-ca
          secret:
            secretName: {{ .Values.tls.caSecretName | quote }}
      {{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "charon.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "charon.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "charon.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "charon.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "charon.fullname" . }}
      containers:
        - name: charon
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8090
          env:
            - name: SERVICE_NAME
              value: {{ .Values.env.SERVICE_NAME | quote }}
            - name: SERVICE_VERSION
              value: {{ .Values.env.SERVICE_VERSION | quote }}
            - name: CHARON_AGENT_ID
              value: {{ .Values.env.CHARON_AGENT_ID | quote }}
            - name: JUDY_BASE_URL
              value: {{ .Values.env.JUDY_BASE_URL | quote }}
            - name: JUDY_TIMEOUT_SECONDS
              value: {{ .Values.env.JUDY_TIMEOUT_SECONDS | quote }}
            - name: CHARON_SIGNATURE_HEADER
              value: {{ .Values.env.CHARON_SIGNATURE_HEADER | quote }}
            - name: CHARON_SIGNATURE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "charon.fullname" . }}-secrets
                  key: CHARON_SIGNATURE_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 12 }}
